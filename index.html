<!DOCTYPE html>
<html>
<head>
    <title>Smart Emergency Detection</title>
</head>
<body>

<h2>Smart Emergency Detection 🚑</h2>
<p>Tap anywhere to activate monitoring</p>

<p id="status">Status: Waiting...</p>

<script>

// ----------------------
// GLOBAL VARIABLES
// ----------------------
let isAppActive = true;
let started = false;

let lastTotal = 0;
let lastTime = Date.now();
let lastFallTime = 0;

// ----------------------
// AUTO START (ONE TIME)
// ----------------------
document.addEventListener("touchstart", () => {
    if (!started) {
        started = true;
        startSystem();
    }
});

document.addEventListener("click", () => {
    if (!started) {
        started = true;
        startSystem();
    }
});

// ----------------------
// APP ACTIVE DETECTION
// ----------------------
document.addEventListener("visibilitychange", () => {
    isAppActive = !document.hidden;
});

window.addEventListener("blur", () => {
    isAppActive = false;
});

window.addEventListener("focus", () => {
    isAppActive = true;
});

// ----------------------
// START SYSTEM
// ----------------------
function startSystem() {

    document.getElementById("status").innerText = "Monitoring started...";

    if (typeof DeviceMotionEvent.requestPermission === 'function') {
        DeviceMotionEvent.requestPermission().then(res => {
            if (res === 'granted') {
                startSensors();
            }
        });
    } else {
        startSensors();
    }
}

// ----------------------
// SENSOR LISTENER (CONTINUOUS)
// ----------------------
function startSensors() {

    window.addEventListener("devicemotion", function(event) {

        if (!isAppActive) return; // 🔥 stop if inactive

        let acc = event.accelerationIncludingGravity;
        if (!acc) return;

        let x = acc.x || 0;
        let y = acc.y || 0;
        let z = acc.z || 0;

        let total = Math.sqrt(x*x + y*y + z*z);

        document.getElementById("status").innerText =
            "Monitoring... Acc: " + total.toFixed(2);

        detectFall(total);
    });
}

// ----------------------
// FALL DETECTION (SPIKE)
// ----------------------
function detectFall(total) {

    let currentTime = Date.now();
    let timeDiff = currentTime - lastTime;

    let change = Math.abs(total - lastTotal);

    if (
        total > 12 &&
        change > 5 &&
        timeDiff < 300
    ) {
        if (currentTime - lastFallTime > 5000) {
            lastFallTime = currentTime;
            handleFall("Sudden Impact Detected");
        }
    }

    lastTotal = total;
    lastTime = currentTime;
}

// ----------------------
// HANDLE FALL
// ----------------------
function handleFall(reason) {

    if (!isAppActive) return;

    document.getElementById("status").innerText = "⚠️ " + reason;

    setTimeout(() => {

        let response = confirm("Are you okay?");

        if (!response) {
            triggerEmergency();
        } else {
            document.getElementById("status").innerText = "✅ User is safe";
        }

    }, 2000);
}

// ----------------------
// EMERGENCY
// ----------------------
function triggerEmergency() {

    document.getElementById("status").innerText = "🚑 Emergency Triggered! Getting location...";

    // Step 1: Get user location
    if (navigator.geolocation) {

        navigator.geolocation.getCurrentPosition(
            (position) => {

                let lat = position.coords.latitude;
                let lon = position.coords.longitude;

                console.log("Location:", lat, lon);

                document.getElementById("status").innerText =
                    "📍 Location detected! Finding nearest hospital...";

                // Step 2: Mock hospital data
                let hospitals = [
                    { name: "City Hospital", available: true },
                    { name: "Apollo Hospital", available: false },
                    { name: "Government Hospital", available: true }
                ];

                // Step 3: Pick first available hospital
                let selectedHospital = hospitals.find(h => h.available);

                if (!selectedHospital) {
                    document.getElementById("status").innerText =
                        "❌ No hospitals available!";
                    return;
                }

                document.getElementById("status").innerText =
                    "🏥 " + selectedHospital.name + " is available. Opening route...";

                // Step 4: Open Google Maps with fastest route
                let mapsURL = `https://www.google.com/maps/dir/?api=1&origin=${lat},${lon}&destination=${selectedHospital.name}&travelmode=driving`;

                window.open(mapsURL, "_blank");

                // Step 5: Simulate emergency call
                console.log("📞 Calling ambulance...");
            },

            (error) => {
                console.error("Location error:", error);
                document.getElementById("status").innerText =
                    "❌ Unable to get location!";
            }
        );

    } else {
        document.getElementById("status").innerText =
            "❌ Geolocation not supported!";
    }
}

</script>

</body>
</html>
