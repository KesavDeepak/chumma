<!DOCTYPE html>
<html>
<head>
    <title>Smart Emergency Detection</title>
</head>
<body>

<h2>Smart Emergency Detection 🚑</h2>

<button onclick="startSystem()">Start Monitoring</button>
<button onclick="simulateFall()">Simulate Fall (Demo)</button>

<p id="status">Status: Waiting...</p>

<script>

// ----------------------
// GLOBAL VARIABLES
// ----------------------
let isAppActive = true;
let monitoring = false;
let fallCooldown = false;

// ----------------------
// APP ACTIVE DETECTION
// ----------------------
document.addEventListener("visibilitychange", () => {
    isAppActive = !document.hidden;
    console.log("Visibility:", isAppActive);
});

window.addEventListener("blur", () => {
    isAppActive = false;
});

window.addEventListener("focus", () => {
    isAppActive = true;
});

// ----------------------
// START SYSTEM
// ----------------------
function startSystem() {

    monitoring = true;
    document.getElementById("status").innerText = "Monitoring started...";

    if (typeof DeviceMotionEvent.requestPermission === 'function') {
        DeviceMotionEvent.requestPermission().then(res => {
            if (res === 'granted') {
                startSensors();
            } else {
                alert("Permission denied");
            }
        });
    } else {
        startSensors();
    }
}

// ----------------------
// SENSOR LISTENER
// ----------------------
function startSensors() {

    window.addEventListener("devicemotion", function(event) {

        if (!monitoring) return;

        let acc = event.accelerationIncludingGravity;
        if (!acc) return;

        let x = acc.x || 0;
        let y = acc.y || 0;
        let z = acc.z || 0;

        let total = Math.sqrt(x*x + y*y + z*z);

        // Show live value
        document.getElementById("status").innerText =
            "Monitoring... Acc: " + total.toFixed(2);

        // FALL DETECTION
        if (total > 18 && !fallCooldown) {
            fallCooldown = true;
            handleFall("Sensor Fall Detected");

            // Prevent multiple triggers
            setTimeout(() => {
                fallCooldown = false;
            }, 10000);
        }
    });
}

// ----------------------
// HANDLE FALL
// ----------------------
function handleFall(reason) {

    // Check app active
    if (!isAppActive) {
        console.log("App inactive → ignoring");
        return;
    }

    document.getElementById("status").innerText = "⚠️ " + reason;

    // Wait 2 seconds before asking
    setTimeout(() => {

        let response = confirm("Are you okay?");

        if (!response) {
            triggerEmergency();
        } else {
            document.getElementById("status").innerText = "✅ User is safe";
        }

    }, 2000);
}

// ----------------------
// EMERGENCY ACTION
// ----------------------
function triggerEmergency() {

    document.getElementById("status").innerText = "🚑 Emergency Triggered!";

    // Simulate backend call
    console.log("Calling ambulance...");
    console.log("Sending location...");
}

// ----------------------
// DEMO BUTTON (VERY IMPORTANT)
// ----------------------
function simulateFall() {
    handleFall("Manual Demo Trigger");
}

</script>

</body>
</html>
