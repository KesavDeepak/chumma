<!DOCTYPE html>
<html>
<head>
    <title>Smart Emergency Detection</title>
</head>
<body>

<h2>Smart Emergency Detection 🚑</h2>

<button onclick="startSystem()">Start Monitoring</button>
<button onclick="simulateFall()">Simulate Fall (Demo)</button>

<p id="status">Status: Waiting...</p>

<script>

// ----------------------
// GLOBAL VARIABLES
// ----------------------
let isAppActive = true;
let monitoring = false;

let lastTotal = 0;
let lastTime = Date.now();
let lastFallTime = 0;

// ----------------------
// APP ACTIVE DETECTION
// ----------------------
document.addEventListener("visibilitychange", () => {
    isAppActive = !document.hidden;
});

window.addEventListener("blur", () => {
    isAppActive = false;
});

window.addEventListener("focus", () => {
    isAppActive = true;
});

// ----------------------
// START SYSTEM
// ----------------------
function startSystem() {

    monitoring = true;
    document.getElementById("status").innerText = "Monitoring started...";

    if (typeof DeviceMotionEvent.requestPermission === 'function') {
        DeviceMotionEvent.requestPermission().then(res => {
            if (res === 'granted') {
                startSensors();
            } else {
                alert("Permission denied");
            }
        });
    } else {
        startSensors();
    }
}

// ----------------------
// SENSOR LISTENER
// ----------------------
function startSensors() {

    window.addEventListener("devicemotion", function(event) {

        if (!monitoring) return;

        let acc = event.accelerationIncludingGravity;
        if (!acc) return;

        let x = acc.x || 0;
        let y = acc.y || 0;
        let z = acc.z || 0;

        let total = Math.sqrt(x*x + y*y + z*z);

        document.getElementById("status").innerText =
            "Monitoring... Acc: " + total.toFixed(2);

        detectFall(total);
    });
}

// ----------------------
// FALL DETECTION (SPIKE BASED)
// ----------------------
function detectFall(total) {

    let currentTime = Date.now();
    let timeDiff = currentTime - lastTime;

    let change = Math.abs(total - lastTotal);

    // 🔥 Adjusted logic
    if (
        total > 11 &&       // lower threshold
        change > 5 &&       // sudden spike
        timeDiff < 300      // fast change
    ) {

        // ⏱️ Cooldown to prevent repeated triggers
        if (currentTime - lastFallTime > 5000) {
            lastFallTime = currentTime;
            handleFall("Sudden Impact Detected");
        }
    }

    lastTotal = total;
    lastTime = currentTime;
}

// ----------------------
// HANDLE FALL
// ----------------------
function handleFall(reason) {

    if (!isAppActive) {
        console.log("App inactive → ignoring");
        return;
    }

    document.getElementById("status").innerText = "⚠️ " + reason;

    setTimeout(() => {
        let response = confirm("Are you okay?");

        if (!response) {
            triggerEmergency();
        } else {
            document.getElementById("status").innerText = "✅ User is safe";
        }
    }, 2000);
}

// ----------------------
// EMERGENCY ACTION
// ----------------------
function triggerEmergency() {

    document.getElementById("status").innerText = "🚑 Emergency Triggered!";

    console.log("Calling ambulance...");
    console.log("Sending location...");
}

// ----------------------
// DEMO BUTTON
// ----------------------
function simulateFall() {
    handleFall("Manual Demo Trigger");
}

</script>

</body>
</html>
