<!DOCTYPE html>
<html>
<head>
    <title>Smart Emergency Detection</title>
</head>
<body>

<h2>Smart Emergency Detection 🚑</h2>
<p>Tap anywhere to activate monitoring</p>

<p id="status">Status: Waiting...</p>

<script>

// ----------------------
// GLOBAL VARIABLES
// ----------------------
let isAppActive = true;
let started = false;

let lastTotal = 0;
let lastTime = Date.now();

let fallDetected = false;
let lastFallTime = 0;

// ----------------------
// AUTO START (ONE TIME)
// ----------------------
document.addEventListener("touchstart", () => {
    if (!started) {
        started = true;
        startSystem();
    }
});

document.addEventListener("click", () => {
    if (!started) {
        started = true;
        startSystem();
    }
});

// ----------------------
// APP ACTIVE DETECTION
// ----------------------
document.addEventListener("visibilitychange", () => {
    isAppActive = !document.hidden;
});

window.addEventListener("blur", () => {
    isAppActive = false;
});

window.addEventListener("focus", () => {
    isAppActive = true;
});

// ----------------------
// START SYSTEM
// ----------------------
function startSystem() {

    document.getElementById("status").innerText = "Monitoring started...";

    if (typeof DeviceMotionEvent.requestPermission === 'function') {
        DeviceMotionEvent.requestPermission().then(res => {
            if (res === 'granted') {
                startSensors();
            }
        });
    } else {
        startSensors();
    }
}

// ----------------------
// SENSOR LISTENER
// ----------------------
function startSensors() {

    window.addEventListener("devicemotion", function(event) {

        if (!isAppActive) return;

        let acc = event.accelerationIncludingGravity;
        if (!acc) return;

        let x = acc.x || 0;
        let y = acc.y || 0;
        let z = acc.z || 0;

        let total = Math.sqrt(x*x + y*y + z*z);

        document.getElementById("status").innerText =
            "Monitoring... Acc: " + total.toFixed(2);

        detectFall(total);
    });
}

// ----------------------
// FALL DETECTION (IMPACT + STILLNESS)
// ----------------------
function detectFall(total) {

    let currentTime = Date.now();
    let change = Math.abs(total - lastTotal);

    // Step 1: Detect impact
    if (total > 14 && change > 6) {

        // cooldown
        if (currentTime - lastFallTime < 5000) return;

        fallDetected = true;
        lastFallTime = currentTime;

        console.log("Impact detected");

        // Step 2: Check stillness after 2 sec
        setTimeout(() => {

            if (!isAppActive) return;

            let stillness = Math.abs(total - lastTotal);

            if (stillness < 1) {
                console.log("Still → possible fall");
                handleFall("Fall + No Movement Detected");
            } else {
                console.log("Movement → false alarm");
            }

            fallDetected = false;

        }, 2000);
    }

    lastTotal = total;
    lastTime = currentTime;
}

// ----------------------
// HANDLE FALL
// ----------------------
function handleFall(reason) {

    if (!isAppActive) return;

    document.getElementById("status").innerText = "⚠️ " + reason;

    setTimeout(() => {

        let response = confirm("Are you okay?");

        if (!response) {
            triggerEmergency();
        } else {
            document.getElementById("status").innerText = "✅ User is safe";
        }

    }, 1000);
}

// ----------------------
// EMERGENCY
// ----------------------
function triggerEmergency() {

    document.getElementById("status").innerText = "🚑 Emergency Triggered! Getting location...";

    if (navigator.geolocation) {

        navigator.geolocation.getCurrentPosition(
            (position) => {

                let lat = position.coords.latitude;
                let lon = position.coords.longitude;

                document.getElementById("status").innerText =
                    "📍 Location detected! Finding hospital...";

                let hospitals = [
                    { name: "City Hospital", available: true },
                    { name: "Apollo Hospital", available: false },
                    { name: "Government Hospital", available: true }
                ];

                let selectedHospital = hospitals.find(h => h.available);

                if (!selectedHospital) {
                    document.getElementById("status").innerText =
                        "❌ No hospitals available!";
                    return;
                }

                document.getElementById("status").innerText =
                    "🏥 " + selectedHospital.name + " available. Opening route...";

                let mapsURL = `https://www.google.com/maps/dir/?api=1&origin=${lat},${lon}&destination=${selectedHospital.name}&travelmode=driving`;

                window.open(mapsURL, "_blank");

                console.log("📞 Calling ambulance...");
            },

            () => {
                document.getElementById("status").innerText =
                    "❌ Location access failed!";
            }
        );
    }
}

</script>

</body>
</html>
