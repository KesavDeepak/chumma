<!DOCTYPE html>
<html>
<head>
    <title>Smart Emergency Detection</title>
</head>
<body>

<h2>Smart Emergency Detection 🚑</h2>
<p>Tap anywhere to activate monitoring</p>

<p id="status">Status: Waiting...</p>

<script>

// ----------------------
// GLOBAL VARIABLES
// ----------------------
let isAppActive = true;
let started = false;

let lastTotal = 0;
let lastFallTime = 0;

// Shake detection
let shakeCount = 0;
let shakeStartTime = 0;

// Inactivity detection
let lastMovementTime = Date.now();
const INACTIVITY_LIMIT = 60000; // 1 minutes

// ----------------------
// AUTO START (ONE TIME)
// ----------------------
document.addEventListener("touchstart", startOnce);
document.addEventListener("click", startOnce);

function startOnce() {
    if (!started) {
        started = true;
        startSystem();
    }
}

// ----------------------
// APP ACTIVE DETECTION
// ----------------------
document.addEventListener("visibilitychange", () => {
    isAppActive = !document.hidden;
});

window.addEventListener("blur", () => {
    isAppActive = false;
});

window.addEventListener("focus", () => {
    isAppActive = true;
});

// ----------------------
// START SYSTEM
// ----------------------
function startSystem() {

    document.getElementById("status").innerText = "Monitoring started...";

    if (typeof DeviceMotionEvent.requestPermission === 'function') {
        DeviceMotionEvent.requestPermission().then(res => {
            if (res === 'granted') {
                startSensors();
            } else {
                alert("Sensor permission denied");
            }
        });
    } else {
        startSensors();
    }
}

// ----------------------
// SENSOR LISTENER
// ----------------------
function startSensors() {

    window.addEventListener("devicemotion", function(event) {

        if (!isAppActive) return;

        let acc = event.accelerationIncludingGravity;
        if (!acc) return;

        let x = acc.x || 0;
        let y = acc.y || 0;
        let z = acc.z || 0;

        let total = Math.sqrt(x*x + y*y + z*z);

        document.getElementById("status").innerText =
            "Monitoring... Acc: " + total.toFixed(2);

        detectShake(total);
        detectInactivity(total);
    });
}

// ----------------------
// SHAKE DETECTION
// ----------------------
function detectShake(total) {

    let currentTime = Date.now();
    let change = Math.abs(total - lastTotal);

    if (total > 14 && change > 5) {

        if (shakeCount === 0) {
            shakeStartTime = currentTime;
        }

        shakeCount++;
    }

    if (shakeCount >= 4 && (currentTime - shakeStartTime < 600)) {

        if (currentTime - lastFallTime > 3000) {

            lastFallTime = currentTime;

            handleFall("Shake Detected");
        }

        shakeCount = 0;
    }

    if (currentTime - shakeStartTime > 800) {
        shakeCount = 0;
    }

    lastTotal = total;
}

// ----------------------
// INACTIVITY DETECTION
// ----------------------
function detectInactivity(total) {

    let currentTime = Date.now();

    // movement detected
    if (Math.abs(total - lastTotal) > 0.5) {
        lastMovementTime = currentTime;
    }

    // no movement for 3 min
    if (currentTime - lastMovementTime > INACTIVITY_LIMIT) {

        lastMovementTime = currentTime; // reset

        handleFall("No Movement Detected for 3 Minutes");
    }
}

// ----------------------
// HANDLE EVENT
// ----------------------
function handleFall(reason) {

    if (!isAppActive) return;

    document.getElementById("status").innerText = "⚠️ " + reason;

    setTimeout(() => {

        let response = confirm("Are you okay?");

        if (!response) {
            triggerEmergency();
        } else {
            document.getElementById("status").innerText = "✅ User is safe";
        }

    }, 1000);
}

// ----------------------
// EMERGENCY SYSTEM
// ----------------------
function triggerEmergency() {

    document.getElementById("status").innerText =
        "🚑 Emergency Triggered! Getting location...";

    if (navigator.geolocation) {

        navigator.geolocation.getCurrentPosition(
            (position) => {

                let lat = position.coords.latitude;
                let lon = position.coords.longitude;

                document.getElementById("status").innerText =
                    "📍 Location detected! Finding hospital...";

                let hospitals = [
                    { name: "City Hospital", available: true },
                    { name: "Apollo Hospital", available: false },
                    { name: "Government Hospital", available: true }
                ];

                let selectedHospital = hospitals.find(h => h.available);

                if (!selectedHospital) {
                    document.getElementById("status").innerText =
                        "❌ No hospitals available!";
                    return;
                }

                document.getElementById("status").innerText =
                    "🏥 " + selectedHospital.name + " available. Opening route...";

                let mapsURL =
                    `https://www.google.com/maps/dir/?api=1&origin=${lat},${lon}&destination=${selectedHospital.name}&travelmode=driving`;

                window.open(mapsURL, "_blank");

                console.log("📞 Calling ambulance...");
            },

            () => {
                document.getElementById("status").innerText =
                    "❌ Location access failed!";
            }
        );
    }
}

</script>

</body>
</html>
